name: Build Flutter APK for Physical Devices

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Common for newer Flutter/Android projects

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.19.0' # Optional: uncomment and specify if you need a specific version

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs for Physical Devices
        # Targets arm64-v8a (modern devices) and armeabi-v7a (older devices)
        run: flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      - name: Upload arm64-v8a APK (Modern Devices)
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a APK (Older Devices)
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
